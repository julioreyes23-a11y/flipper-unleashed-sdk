cat > .github/workflows/unleashed-sdk-build.yml <<'EOF'
name: Unleashed DEV + Full SDK Build
on:
  workflow_dispatch:
  push:
    branches: [ "dev", "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Unleashed repo with full SDK
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install ARM toolchain + build deps
      run: |
        sudo apt update
        sudo apt install -y \
          git cmake ninja-build gcc-arm-none-eabi \
          binutils-arm-none-eabi python3 python3-pip \
          libnewlib-arm-none-eabi
    - name: Install Python dependencies
      run: |
        pip3 install -r requirements.txt || true
    - name: Build full Unleashed DEV firmware
      run: |
        ./fbt firmware_all
    - name: Build full SDK
      run: |
        ./fbt sdk
    - name: Package SDK
      run: |
        mkdir -p sdk-package
        cp -r build/sdk/* sdk-package/
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: unleashed-dev-firmware
        path: build/f7-firmware-D/
    - name: Upload full SDK
      uses: actions/upload-artifact@v4
      with:
        name: flipper-full-sdk
        path: sdk-package/
EOF
